# Copilot Coding Agent Setup Steps
#
# Copy this file to .github/workflows/copilot-setup-steps.yml in your repo.
# It runs before the Copilot coding agent starts, installing OSDU skills
# so the agent can use them during its session.
#
# Docs: https://docs.github.com/en/copilot/customizing-copilot/extending-the-copilot-coding-agent

name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install APM
        run: curl -sSL https://aka.ms/apm-unix | sh

      - name: Install OSDU SPI Skills
        run: apm install
